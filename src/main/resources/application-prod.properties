# Production profile — activate with: SPRING_PROFILES_ACTIVE=prod
# Required environment variables: DB_HOST, DB_USERNAME, DB_PASSWORD, JWT_SECRET

# Server (Elastic Beanstalk / ECS often inject SERVER_PORT)
server.port=${SERVER_PORT:8080}

# Production MySQL (AWS RDS)
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME:leave_management_db}?useSSL=true&requireSSL=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate — schema managed by migrations or manual DDL, not auto-update
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT — must be supplied at runtime (64+ char hex recommended for HS256)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Reduced logging in production
logging.level.org.springframework.security=WARN
logging.level.root=INFO
